syntax = "proto3";

package testdata;

option go_package = "github.com/zshainsky/aip160/pkg/filter/validator/testdata";

// Status represents a user status for enum validation testing
enum Status {
  STATUS_UNSPECIFIED = 0;
  STATUS_ACTIVE = 1;
  STATUS_INACTIVE = 2;
  STATUS_PENDING = 3;
}

// Person represents a person with an enum field for enum validation testing
message Person {
  string name = 1;
  Status status = 2;
  int32 age = 3;
  bool verified = 4;
}
