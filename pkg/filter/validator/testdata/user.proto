syntax = "proto3";

package testdata;

option go_package = "github.com/zshainsky/aip160/pkg/filter/validator/testdata";

// User represents a simple user with scalar fields for basic validation testing
// Tests all 15 proto3 scalar types for comprehensive coverage
message User {
  // String types
  string name = 1;
  string email = 3;
  bytes profile_image = 8;
  
  // Boolean
  bool active = 4;
  
  // Standard signed integers
  int32 age = 2;
  int64 user_id = 5;
  
  // Unsigned integers
  uint32 points = 10;
  uint64 balance = 11;
  
  // Signed integers (optimized for negative numbers)
  sint32 temperature = 12;
  sint64 offset = 13;
  
  // Fixed-width unsigned integers
  fixed32 fixed_id = 14;
  fixed64 fixed_timestamp = 15;
  
  // Fixed-width signed integers
  sfixed32 sfixed_coord_x = 16;
  sfixed64 sfixed_coord_y = 17;
  
  // Floating point
  float score = 6;
  double rating = 7;
  
  // Collections
  repeated string tags = 9;
}
