syntax = "proto3";

package testdata;

option go_package = "github.com/zshainsky/aip160/pkg/filter/validator/testdata";

// Result enum without prefix - testing non-standard naming
enum Result {
  UNSPECIFIED = 0;
  SUCCESS = 1;
  FAILED = 2;
  PENDING = 3;
}

// Task message using Result enum
message Task {
  string name = 1;
  Result result = 2;
}
