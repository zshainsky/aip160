syntax = "proto3";

package testdata;

option go_package = "github.com/zshainsky/aip160/pkg/filter/validator/testdata";

// Email represents an email address for nested field testing
message Email {
  string address = 1;
  bool verified = 2;
  string domain = 3;
}

// Address represents a physical address for deep nesting tests
message Address {
  string street = 1;
  string city = 2;
  string country = 3;
}

// Profile represents nested settings for deep nesting tests
message Profile {
  string theme = 1;
  bool notifications = 2;
}

// Contact represents a contact with nested messages for traversal testing
message Contact {
  string name = 1;
  Email email = 2;
  Address address = 3;
  Profile profile = 4;
  repeated string phone_numbers = 5;
}
